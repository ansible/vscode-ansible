name: CI

on:
  push:
    branches: [next]
  pull_request:
    branches: [next]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        node-version: [22, 24, 26]

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: pnpm run compile

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        if: ${{ always() && hashFiles('coverage/cobertura-coverage.xml') != '' }}
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/cobertura-coverage.xml
          flags: unit-node${{ matrix.node-version }}
          disable_search: true
          fail_ci_if_error: true
          use_oidc: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - parallel:
          - name: Install Node dependencies
            run: pnpm install --frozen-lockfile
          - name: Install prek and uv
            run: |
              pipx install prek
              pipx install uv

      - parallel:
          - name: Lint (prek)
            run: pnpm run lint
          - name: Lint (knip)
            run: pnpm run lint:knip

  integration:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run compile
      - run: pnpm run build

      - name: Run integration tests
        run: xvfb-run --auto-servernum pnpm run test:integration

  ui:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run compile
      - run: pnpm run build

      - parallel:
          - name: Pre-install Chromedriver
            run: pnpm exec tsx tools/ensure-chromedriver.mts
          - name: Install test dependency extensions
            run: pnpm run pretest:ui
          - name: Build Lightspeed webviews
            run: pnpm run build:lightspeed:webviews

      - name: Run UI tests
        run: xvfb-run --auto-servernum pnpm run test:ui
        env:
          WDIO_COVERAGE: "1"

      - name: Run Lightspeed UI tests
        run: xvfb-run --auto-servernum pnpm run test:lightspeed:ui
        env:
          WDIO_COVERAGE: "1"

      - name: Upload WDIO coverage to Codecov
        if: ${{ always() && hashFiles('coverage/wdio/lcov.info') != '' }}
        uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f # v7
        with:
          files: ./coverage/wdio/lcov.info
          flags: wdio
          disable_search: true
          fail_ci_if_error: false
          use_oidc: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Build docs
        run: pnpm run docs:build

  package:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build VSIX
        run: pnpm exec vsce package --no-dependencies

      - name: Build servers
        run: pnpm run build

      - name: Build plugin
        run: ./scripts/build-plugin.sh

      - name: Pack npm tarballs
        run: |
          pnpm run compile
          pnpm --filter @ansible/common pack --pack-destination "$GITHUB_WORKSPACE"
          pnpm --filter @ansible/developer-services pack --pack-destination "$GITHUB_WORKSPACE"
          pnpm --filter @ansible/mcp-server pack --pack-destination "$GITHUB_WORKSPACE"
          pnpm --filter @ansible/language-server pack --pack-destination "$GITHUB_WORKSPACE"

      - parallel:
          - name: Upload VSIX
            uses: actions/upload-artifact@v7
            with:
              name: vsix
              path: "*.vsix"
              retention-days: 14
          - name: Upload plugin
            uses: actions/upload-artifact@v7
            with:
              name: plugin
              path: dist/ansible-devtools-plugin.zip
              retention-days: 14
          - name: Upload MCP server
            uses: actions/upload-artifact@v7
            with:
              name: mcp-server
              path: dist/mcp-server.js
              retention-days: 14
          - name: Upload language server
            uses: actions/upload-artifact@v7
            with:
              name: language-server
              path: dist/language-server.js
              retention-days: 14
          - name: Upload npm tarballs
            uses: actions/upload-artifact@v7
            with:
              name: npm-tarballs
              path: "*.tgz"
              retention-days: 14
