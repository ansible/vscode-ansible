name: CI

on:
  push:
    branches: [next]
  pull_request:
    branches: [next]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: ${{ always() && hashFiles('coverage/cobertura-coverage.xml') != '' }}
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/cobertura-coverage.xml
          flags: unit-node${{ matrix.node-version }}
          disable_search: true
          fail_ci_if_error: true
          use_oidc: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint

  integration:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run compile
      - run: npm run build

      - name: Run integration tests
        run: xvfb-run --auto-servernum npm run test:integration

  ui:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run compile
      - run: npm run build

      - name: Apply wdio-vscode-service patch
        run: patch -p1 --forward --directory=node_modules/wdio-vscode-service < patches/wdio-vscode-service@6.1.4.patch || true

      - name: Pre-install Chromedriver
        run: npx tsx tools/ensure-chromedriver.mts

      - name: Install test dependency extensions
        run: npm run pretest:ui

      - name: Build Lightspeed webviews
        run: npm run build:lightspeed:webviews

      - name: Run UI tests
        run: xvfb-run --auto-servernum npm run test:ui

      - name: Run Lightspeed UI tests
        run: xvfb-run --auto-servernum npm run test:lightspeed:ui

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Build docs
        run: npm run docs:build

  package:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build VSIX
        run: npm exec vsce -- package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v5
        with:
          name: vsix
          path: "*.vsix"
          retention-days: 14
