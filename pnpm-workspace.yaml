# cspell: ignore fastify undici
minimumReleaseAge: 1000 # 4320 # minutes (3 days)
packages:
  - "packages/*"
allowBuilds:
  '@google/genai': true
  '@vscode/vsce-sign': true
  edgedriver: true
  electron: true
  esbuild: true
  geckodriver: true
  keytar: true
  protobufjs: true
  unrs-resolver: true

overrides:
  rollup: "npm:@rollup/wasm-node@*"
  # Security overrides
  "fast-uri@3": ">=3.1.2"
  "fastify": ">=5.8.3"
  "form-data@4": ">=4.0.6"
  "js-yaml@4": ">=4.2.0"
  "markdown-it": ">=14.2.0"
  "protobufjs@7": ">=7.6.3"
  "serialize-javascript": ">=7.0.5"
  "tar-fs@3": ">=3.1.2"
  "ws@8": ">=8.17.1"

patchedDependencies:
  # See: https://github.com/microsoft/vscode-test-cli/issues/106
  "@vscode/test-cli@0.0.15": "patches/@vscode__test-cli@0.0.15.patch"
packageExtensions:
  "cypress-multi-reporters@*":
    "dependencies":
      "mocha": "*"
  "mocha-junit-reporter@*":
    "dependencies":
      "mocha": "*"
