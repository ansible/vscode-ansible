---
dictionaryDefinitions:
  - name: words
    path: .config/dictionary.txt
    addWords: true
dictionaries:
  # Use `cspell-cli trace word` to check where a work is defined
  - bash
  - cpp-compound-words
  - en_US
  - python
  - words
  - "!backwards-compatibility"
  - "!cryptocurrencies"
  - "!cpp"
enabled: true
enableGlobDot: true
useGitignore: true
ignorePaths:
  - "**/*-artifact-*.json"
  - "**/lib/"
  - "*.svg"
  - .git
  - dist/
  - media
  - out/
  - package.json
  - pnpm-lock.yaml
  - syntaxes
  - syntaxes/external/*.*
  - test/testFixtures/lightspeed/*.yml
  - tsconfig*.json
  - uv.lock
  - .claude/settings.local.json
  - ./src/webviewHtml.ts
ignoreRegExpList:
  # ignore github usernames like @foo
  - "@[\\w]+"
  # ignore usernames in vscode settings paths
  - "/Users/[\\w]+/"
