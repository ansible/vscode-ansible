fail_fast = true

# ── File hygiene (builtin — no network fetch) ──────────────────────────
[[repos]]
repo = "builtin"
hooks = [
  { id = "end-of-file-fixer", exclude = '\.svg$' },
  { id = "trailing-whitespace", exclude = '\.svg$' },
  { id = "mixed-line-ending" },
  { id = "check-merge-conflict" },
  {
    id = "check-json",
    exclude = '(ansible|jinja)-language-configuration\.json'
  },
]

