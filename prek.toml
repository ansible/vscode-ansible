# ── pre-commit-hooks (additional checks) ───────────────────────────────
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-executables-have-shebangs", priority = 0 },
  { id = "fix-byte-order-marker", priority = 0 },
]

# ── Commitlint — conventional commit enforcement ──────────────────────
[[repos]]
repo = "https://github.com/alessandrojcm/commitlint-pre-commit-hook"
rev = "v9.25.0"
hooks = [
  { id = "commitlint", stages = ["commit-msg"] },
]

# ── Local hooks ────────────────────────────────────────────────────────
[[repos]]
repo = "local"

[[repos.hooks]]
id = "eslint"
name = "eslint"
entry = "pnpm exec eslint . --no-warn-ignored --color --fix --max-warnings=0"
language = "system"
pass_filenames = false
priority = 0
always_run = true

[[repos.hooks]]
id = "cspell"
name = "cspell"
entry = "pnpm exec cspell --no-progress --no-summary --color"
language = "system"
types = ["markdown"]
exclude = '(node_modules/|dist/|out/|\.wdio-vscode/)'
priority = 0

[[repos.hooks]]
id = "check-script-docs"
name = "check-script-docs"
entry = "node scripts/check-script-docs.mjs"
language = "system"
pass_filenames = false
files = '^package\.json$|^scripts/help\.mjs$'
priority = 0

[[repos.hooks]]
id = "check-skill-frontmatter"
name = "check-skill-frontmatter"
entry = "uv run scripts/check_skill_frontmatter.py"
language = "system"
pass_filenames = false
always_run = true
priority = 0

[[repos.hooks]]
id = "knip"
name = "knip"
entry = "pnpm exec knip"
language = "system"
pass_filenames = false
always_run = true
priority = 0
