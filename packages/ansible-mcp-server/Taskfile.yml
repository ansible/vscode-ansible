---
# see https://taskfile.dev/#/
env:
  # basically the same thing from .env file:
  # Avoid undesired extra hints from docker when pulling images
  DOCKER_CLI_HINTS: "false"
vars:
  PROJECT: ansible-mcp-server
  VIRTUAL_ENV:
    sh: echo "${HOME}/.local/share/virtualenvs/vsa"
includes:
  base:
    taskfile: ../../Taskfile.base.yml
    internal: true
    flatten: true
tasks:
  default:
    dir: "{{ .TASKFILE_DIR }}"
    desc: Run most commands
    env:
      VERSION:
        sh: node -p "require('./package.json').version"
    deps:
      - package
    cmds:
      - task: test
      - echo Done {{.PROJECT}} {{.VERSION}}!
  build:
    dir: "{{ .TASKFILE_DIR }}"
    desc: Build the project
    deps:
      - setup
    cmds:
      - npm run compile
    generates:
      - lib/**/*.*
      - dist/**/*.*
    sources:
      - ../../package-lock.json
      - package.json
      - src/**/*.*
      - test/**/*.*
      - tsconfig.json
      - ../../tsconfig*.json
      - exclude: "**/*-artifact-*.json"
  test:
    desc: Run all tests and coverage report
    dir: "{{ .TASKFILE_DIR }}"
    interactive: true
    deps:
      - build
    generates:
      - ../../out/junit/mcp-test-results.xml
    sources:
      - ../../vitest.config.ts
      - package.json
      - src/**/*.*
      - test/**/*.*
      - tsconfig.json
      - exclude: "**/*-artifact-*.json"
    cmds:
      - npm run test
  test-watch:
    desc: Run tests in watch mode
    dir: "{{ .TASKFILE_DIR }}"
    cmds:
      - npm run test:watch
    interactive: true
  package:
    desc: Package {{ .PROJECT }}
    deps:
      - build
    dir: "{{ .TASKFILE_DIR }}"
    sources:
      - README.md
      - package*.json
      - src/**/*.*
      - tsconfig.json
      - tsup.config.ts
    generates:
      - '{{ .GIT_ROOT }}/out/@ansible-{{ .PROJECT }}-*.tgz'
    cmds:
      - rm -f '{{ .GIT_ROOT }}/out/@ansible-{{ .PROJECT }}-*.tgz'
      - yarn pack --out '{{ .GIT_ROOT }}/out/%s-%v.tgz'
    silent: false
  clean:
    desc: Clean build artifacts
    dir: "{{ .TASKFILE_DIR }}"
    cmds:
      - rm -rf node_modules/.cache
version: "3"
