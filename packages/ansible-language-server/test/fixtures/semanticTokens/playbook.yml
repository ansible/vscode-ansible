---
- name: Semantic tokens play
  hosts: localhost
  custom_play_key: play_value
  environment:
    FOO: bar
    NESTED_ENV:
      INNER: value
  roles:
    - name: role_1
      when: true
      custom_role_key: role_value
  tasks:
    - name: Known module with options
      org_1.coll_1.module_1:
        opt_1:
          - sub_opt_1: choice_1
            sub_opt_2:
              - sub_sub_opt_1: value
            unknown_list_item: scalar_value
          - plain_scalar
        opt_2: string_value
        unknown_opt: ignored
        opt_dict:
          nested_a: 1
          nested_b:
            deeper: 2
        ? [complex, key]
        : complex_value
      args:
        opt_2: via_args
      register: result

    - name: Builtin style module without map value
      ansible.builtin.debug: null

    - name: Unknown module
      not_a_real_module:
        foo: bar
        nested_map:
          a: 1
        nested_list:
          - item_a
          - key: item_b

    - name: Block task
      custom_block_key: block_value
      block:
        - name: Nested task
          org_1.coll_1.module_1:
            opt_2: nested
      rescue:
        - name: Rescue task
          ansible.builtin.debug:
            msg: rescued
