---
- hosts: all
  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
      notify: Restart nginx

    - name: Update config
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
      notify:
        - Restart nginx
        - Reload firewall

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Reload firewall
      ansible.builtin.service:
        name: firewalld
        state: reloaded
      listen: Restart nginx
