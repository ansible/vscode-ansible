---
# see https://taskfile.dev/#/
env:
  # basically the same thing from .env file:
  # Avoid undesired extra hints from docker when pulling images
  DOCKER_CLI_HINTS: "false"
vars:
  PROJECT: ansible-language-server
  EE_VERSION:
    sh: ./tools/get-image-version
  VIRTUAL_ENV:
    sh: echo "${HOME}/.local/share/virtualenvs/vsa"
includes:
  base:
    taskfile: ../../Taskfile.base.yml
    # internal: true
    flatten: true
tasks:
  default:
    dir: "{{ .TASKFILE_DIR }}"
    desc: Run most commands
    env:
      VERSION:
        sh: node -p "require('./package.json').version"
    deps:
      - package
    cmds:
      - task: test
      - echo Done {{.PROJECT}} {{.VERSION}}!
  build:
    dir: "{{ .TASKFILE_DIR }}"
    desc: Build the project
    deps:
      - setup
    cmds:
      - npm run compile
      - yarn exec -- ansible-language-server --generate-docs ../../docs/als/settings.md
    generates:
      - lib/**/*.*
    sources:
      - ../../yarn.lock
      - package.json
      - src/**/*.*
      - test/**/*.*
      - tsconfig.json
      - tsup.config.ts
      - ../../tsconfig*.json
  test:
    desc: Run all tests using node (same version as vscode), will skip @ee tests if both SKIP_PODMAN=1 and SKIP_DOCKER=1.
    dir: "{{ .TASKFILE_DIR }}"
    interactive: true
    deps:
      - build
    sources:
      - ../../pyproject.toml
      - ../../uv.lock
      - ../../vitest.config.ts
      - ../../yarn.lock
      - package.json
      - src/**/*.*
      - test/**/*.*
      - tsconfig.json
    generates:
      - ../../out/coverage/unit/cobertura-coverage.xml # codecov.io
      - ../../out/coverage/unit/lcov.info # sonar
      - ../../out/junit/unit-test-results.xml
    cmds:
      - bash -c ". {{.VIRTUAL_ENV}}/bin/activate && command -v ansible-lint && npm run test"
  test-with-ee:
    dir: '{{ .TASKFILE_DIR }}'
    desc: Run only ee tests
    deps:
      - build
    cmds:
      - |
        . {{.VIRTUAL_ENV}}/bin/activate && bash -c 'npm run test-with-ee'
    interactive: true
  test-without-ee:
    desc: Run only non-ee tests
    dir: '{{ .TASKFILE_DIR }}'
    deps:
      - build
    cmds:
      - bash -c '. {{.VIRTUAL_ENV}}/bin/activate && npm run test-without-ee'
    interactive: true
  package:
    desc: Package {{ .PROJECT }}
    deps:
      - build
    dir: "{{ .TASKFILE_DIR }}"
    sources:
      - ../../docs/als/changelog.md
      - README.md
      - package*.json
      - tsconfig.json
      - tsup.config.ts
    generates:
      - dist/**/*
      - '{{ .GIT_ROOT }}/out/@ansible-{{ .PROJECT }}-*.tgz'
    cmds:
      - rm -f '{{ .GIT_ROOT }}/out/@ansible-{{ .PROJECT }}-*.tgz'
      - yarn pack --out '{{ .GIT_ROOT }}/out/%s-%v.tgz'
    silent: false
  release:
    desc: Create a new release (used by CI)
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - ./tools/release.sh
    interactive: true
version: "3"
