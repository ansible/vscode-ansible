---
ci:
  # format compatible with commitlint
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
  autoupdate_schedule: monthly
  autofix_commit_msg: "chore: auto fixes from pre-commit.com hooks"
  skip:
    - biome
    # - codecov
    - codespell # missing uv
    - cspell
    - eslint
    - md # missing uv
    - mypy # missing uv
    - renovate-config-validator # network
    - ruff # missing uv
    - shellcheck # missing uv
    - toml # missing uv
    - yamllint # missing uv
exclude: >
  (?x)^(
    .*.svg
  )$
fail_fast: true
minimum_prek_version: "0.3.4"
minimum_pre_commit_version: 4.0.0 # Related to https://github.com/ekalinin/nodeenv/issues/369
repos:
  - repo: meta
    hooks:
      - id: check-useless-excludes
        priority: 0
  - repo: https://github.com/ansible/actions
    rev: v0.5.1
    hooks:
      - id: toml
        priority: 1
      - id: mypy
        priority: 2
      - id: ruff
        priority: 1
      - id: codespell
        priority: 1
      - id: cspell
        priority: 1
      - id: yamllint
        priority: 1
      - id: md
        priority: 1
      # - id: codecov
      #   priority: 1
      - id: shellcheck
        priority: 1
      - id: renovate-config-validator
        priority: 1
  - repo: local
    hooks:
      - id: biome
        priority: 1
        name: biome
        alias: biome
        language: system
        pass_filenames: false
        always_run: true
        entry: npx biome check --write --unsafe
      - id: eslint
        name: eslint
        entry: npx
        language: system
        args:
          - eslint
          - --no-warn-ignored
          - --color
          - --format=gha
          - --fix
          - --max-warnings=0
          - --concurrency=2
          # - --cache
          # - --cache-strategy=content
        pass_filenames: false
        priority: 2  # after knip
        always_run: true
  - repo: https://github.com/pre-commit/pre-commit-hooks.git
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        priority: 1
        exclude: >
          (?x)^(
            docs/als/settings.md
          )$
      - id: trailing-whitespace
        priority: 0
        exclude: >
          (?x)^(
            .yarn/.*|
            examples/playbooks/(with-skip-tag-id|unicode).yml|
            examples/playbooks/example.yml|
            docs/als/settings.md
          )$
      - id: mixed-line-ending
        priority: 0
      - id: fix-byte-order-marker
        priority: 0
      - id: check-executables-have-shebangs
        priority: 0
      - id: check-merge-conflict
        priority: 0
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
