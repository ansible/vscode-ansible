---
# see https://taskfile.dev/#/
version: "3"
vars:
  GIT_ROOT:
    sh: git rev-parse --show-toplevel
  VERSION:
    sh: "{{ .GIT_ROOT }}/tools/version.mts"
tasks:
  pnpm:
    cmds:
      - pnpm -r install --frozen-lockfile
    deps:
      - mise
    dir: "{{ .TASKFILE_DIR }}"
    generates:
      - node_modules/.modules.yaml
    sources:
      - package.json
      - packages/*/package.json
      - pnpm-lock.yaml
    run: once
    interactive: true
  uv:
    cmds:
      - uv sync --no-progress -q --active
      - bash ./tools/uv.sh
    deps:
      - mise
    generates:
      - "{{ .VIRTUAL_ENV }}/pyvenv.cfg"
      - "{{ .VIRTUAL_ENV }}/CACHEDIR.TAG"
      - resources/contentCreator/createDevfile/devfile-template.txt
      - resources/contentCreator/createDevcontainer/
    dir: "{{ .TASKFILE_DIR }}"
    sources:
      - pyproject.toml
      - uv.lock
      - tools/uv.sh
      - .config/mise.toml
    run: once
    interactive: true
  setup:
    desc: Setup build toolchain and install missing dependencies
    env:
      # used inside test-setup.sh
      OS: "{{OS}}"
      ARCH: "{{ARCH}}"
    deps:
      - pnpm
      - uv
    dir: "{{ .TASKFILE_DIR }}"
    cmds:
      - bash ./tools/test-setup.sh
      - ./tools/precheck.sh
    sources:
      - ./tools/precheck.sh
      - pyproject.toml
      - tools/test-setup.sh
    generates:
      - out/log/manifest-*.json
    run: once
    interactive: true
  mise:
    desc: Check if mise is installed and working
    internal: true
    silent: true
    status:
      - '[ "$SKIP_MISE" == "1" ] || [ "$CI" == "true" ]'
    cmds:
      - "type mise >/dev/null 2>&1 || { echo ''ERROR: mise not found in PATH'' >&2; exit 1; }"
      - "mise doctor >/dev/null 2>&1 || { mise doctor || echo 'ERROR: mise doctor failed, resolve reported problems.' >&2 && exit 1; }"
  knip:
    desc: Run knip
    interactive: true # no prefix
    dir: "{{ .TASKFILE_DIR }}" # mandatory because running from subfolder will not enable knip to find its config
    deps:
      - package # production needs package, development needs build
    cmds:
      - npm exec -- knip
      - npm exec -- knip --production
      - echo "If knip passed locally but fails on CI, try running 'task clean && task knip' locally to flush all caches."
