codecov:
  require_ci_to_pass: false
  notify:
    after_n_builds: 4
    wait_for_ci: true
comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: "coverage_drop OR uncovered_patch"
  after_n_builds: 4
coverage:
  status:
    patch: false
    project: true
flag_management:
  default_rules:
    carryforward: false
  individual_flags:
    - name: unit-node22
      carryforward: false
    - name: unit-node24
      carryforward: false
    - name: unit-node26
      carryforward: false
    - name: wsl-fedora
      carryforward: false
github_checks:
  annotations: true
ignore:
  - ".agents/**"
  - "scripts/**"
  - "tools/**"
  - "docs/**"
  - "test/**"
  - "**/test/**"
