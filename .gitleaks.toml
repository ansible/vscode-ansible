[allowlist]
description = "Global Allowlist"
# Ignore based on any subset of the file path
paths = [
  # Ignore pnpm virtual store (if present under project)
  '''node_modules/\.pnpm''',
  # Ignore build artifacts and test isolation directories (contains container overlays with false positives)
  # Pattern matches official gitleaks config style: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  '''(?:^|/)out/.*$''',
]
